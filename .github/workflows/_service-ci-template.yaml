name: _service-ci-template

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      image_name:
        required: true
        type: string
      sonar_sources:
        required: false
        type: string
        default: app

concurrency:
  group: ${{ inputs.service_name }}-workflow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ${{ inputs.service_name }}-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ inputs.service_path }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (compile check)
        run: python -m compileall app

  build:
    name: ${{ inputs.service_name }}-docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build metadata
        id: build_meta
        run: echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build service image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}
          file: ${{ inputs.service_path }}/Dockerfile
          pull: true
          load: true
          tags: ${{ inputs.image_name }}:ci-build
          build-args: |
            VERSION=${{ github.sha }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.build_meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sonarcloud:
    name: ${{ inputs.service_name }}-sonarcloud
    runs-on: ubuntu-latest
    env:
      SONAR_CI_ENABLED: ${{ vars.SONAR_CI_ENABLED }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY_PREFIX: ${{ vars.SONAR_PROJECT_KEY_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud precheck
        id: sonar_precheck
        run: |
          if [ "$SONAR_CI_ENABLED" = "true" ] && [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_ORGANIZATION" ] && [ -n "$SONAR_PROJECT_KEY_PREFIX" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarCloud Scan
        if: ${{ steps.sonar_precheck.outputs.enabled == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v4.2.1
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ inputs.service_path }}
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY_PREFIX }}-${{ inputs.service_name }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=${{ inputs.sonar_sources }}
            -Dsonar.exclusions=**/venv/**,**/__pycache__/**,**/*.pyc

      - name: SonarCloud skipped (missing config)
        if: ${{ steps.sonar_precheck.outputs.enabled != 'true' }}
        run: echo "Skipping SonarCloud scan. Set SONAR_CI_ENABLED=true, SONAR_PROJECT_KEY_PREFIX, SONAR_TOKEN and SONAR_ORGANIZATION."

  owasp-dependency-check:
    name: ${{ inputs.service_name }}-owasp-dependency-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare dependency-check suppression file
        env:
          SERVICE_PATH: ${{ inputs.service_path }}
        run: |
          cp .github/dependency-check-suppressions.xml "${SERVICE_PATH}/dependency-check-suppressions.xml"

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: champs-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}
          format: "ALL"
          out: reports-${{ inputs.service_name }}
          args: >
            --enableRetired
            --disableNodeJS
            --disableYarnAudit
            --disablePnpmAudit
            --suppression ${{ inputs.service_path }}/dependency-check-suppressions.xml
            --failOnCVSS 7

      - name: Upload OWASP report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report-${{ inputs.service_name }}
          path: reports-${{ inputs.service_name }}

      - name: Check OWASP SARIF exists
        if: always()
        id: owasp_sarif
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
        run: |
          REPORT_PATH="reports-${SERVICE_NAME}/dependency-check-report.sarif"
          if [ -f "$REPORT_PATH" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload OWASP SARIF to GitHub Security
        if: ${{ always() && steps.owasp_sarif.outputs.exists == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports-${{ inputs.service_name }}/dependency-check-report.sarif

  image-scan:
    name: ${{ inputs.service_name }}-image-scan
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare scan build metadata
        id: scan_build_meta
        run: echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build image (local for scan)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}
          file: ${{ inputs.service_path }}/Dockerfile
          pull: true
          load: true
          tags: ${{ inputs.image_name }}:ci-scan
          build-args: |
            VERSION=${{ github.sha }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.scan_build_meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ inputs.image_name }}:ci-scan
          format: table
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ inputs.image_name }}:ci-scan
          format: sarif
          output: trivy-${{ inputs.service_name }}.sarif
          vuln-type: 'os,library'
          severity: 'MEDIUM,HIGH,CRITICAL'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ inputs.service_name }}.sarif

  docker-publish:
    name: ${{ inputs.service_name }}-docker-publish
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - lint
      - build
      - sonarcloud
      - owasp-dependency-check
      - image-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Prepare publish build metadata
        id: publish_build_meta
        run: echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}
          file: ${{ inputs.service_path }}/Dockerfile
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.publish_build_meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

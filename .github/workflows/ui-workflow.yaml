name: ui-workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - 'UI/**'
      - '.github/workflows/ui-workflow.yaml'
  push:
    branches:
      - main
    paths:
      - 'UI/**'
      - '.github/workflows/ui-workflow.yaml'
  workflow_dispatch:

concurrency:
  group: ui-workflow-${{ github.ref }}
  cancel-in-progress: true

env:
  UI_WORKDIR: UI
  IMAGE_NAME: victormungai/champs-ui

jobs:
  lint:
    name: ui-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.UI_WORKDIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (Type Check)
        run: npm run lint

  build:
    name: ui-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.UI_WORKDIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: UI/dist

  sonarcloud:
    name: ui-sonarcloud
    runs-on: ubuntu-latest
    env:
      SONAR_CI_ENABLED: ${{ vars.SONAR_CI_ENABLED }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud precheck
        id: sonar_precheck
        run: |
          if [ "$SONAR_CI_ENABLED" = "true" ] && [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_PROJECT_KEY" ] && [ -n "$SONAR_ORGANIZATION" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarCloud Scan
        if: ${{ steps.sonar_precheck.outputs.enabled == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v4.2.1
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          projectBaseDir: UI
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/dist/**

      - name: SonarCloud skipped (missing secrets)
        if: ${{ steps.sonar_precheck.outputs.enabled != 'true' }}
        run: echo "Skipping SonarCloud scan. Set SONAR_CI_ENABLED=true and configure SONAR_TOKEN, SONAR_PROJECT_KEY, SONAR_ORGANIZATION."

  owasp-dependency-check:
    name: ui-owasp-dependency-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: OWASP Dependency Check
        id: dependency-check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: champs-ui
          path: UI
          format: "ALL"
          out: reports
          args: >
            --enableRetired
            --failOnCVSS 7

      - name: Upload OWASP report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports

      - name: Check OWASP SARIF exists
        if: always()
        id: owasp_sarif
        run: |
          if [ -f reports/dependency-check-report.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload OWASP SARIF to GitHub Security
        if: ${{ always() && steps.owasp_sarif.outputs.exists == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif

  image-scan:
    name: ui-image-scan
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local for scan)
        uses: docker/build-push-action@v6
        with:
          context: UI
          file: UI/Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-scan
          format: table
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-scan
          format: sarif
          output: trivy-ui.sarif
          vuln-type: 'os,library'
          severity: 'MEDIUM,HIGH,CRITICAL'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-ui.sarif

  docker-publish:
    name: ui-docker-publish
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - lint
      - build
      - sonarcloud
      - owasp-dependency-check
      - image-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: UI
          file: UI/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

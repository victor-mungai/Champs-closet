name: notification-service-workflow

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
    branches:
      - main
    paths:
      - 'notification_service/**'
      - '.github/workflows/_service-ci-template.yaml'
      - '.github/workflows/notification-service-workflow.yaml'
  push:
    branches:
      - main
    paths:
      - 'notification_service/**'
      - '.github/workflows/_service-ci-template.yaml'
      - '.github/workflows/notification-service-workflow.yaml'
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/_service-ci-template.yaml
    with:
      service_name: notification-service
      service_path: notification_service
      image_name: victormungai/champs-notification-service
    secrets: inherit

name: order-service-workflow

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
    branches:
      - main
    paths:
      - 'order_service/**'
      - '.github/workflows/order-service-workflow.yaml'
  push:
    branches:
      - main
    paths:
      - 'order_service/**'
      - '.github/workflows/order-service-workflow.yaml'
  workflow_dispatch:

jobs:
  ci:
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/_service-ci-template.yaml
    with:
      service_name: order-service
      service_path: order_service
      image_name: victormungai/champs-order-service
    secrets: inherit
